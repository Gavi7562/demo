<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator">
        <input class="display" id="display" type="text" value="0" aria-label="Calculator display" readonly>

        <div class="keys">
            <button class="key key-clear" type="button" data-action="clear">AC</button>
            <button class="key" type="button" data-action="delete">DEL</button>
            <button class="key" type="button" data-value="%">%</button>
            <button class="key key-operator" type="button" data-value="/">/</button>

            <button class="key" type="button" data-value="7">7</button>
            <button class="key" type="button" data-value="8">8</button>
            <button class="key" type="button" data-value="9">9</button>
            <button class="key key-operator" type="button" data-value="*">x</button>

            <button class="key" type="button" data-value="4">4</button>
            <button class="key" type="button" data-value="5">5</button>
            <button class="key" type="button" data-value="6">6</button>
            <button class="key key-operator" type="button" data-value="-">-</button>

            <button class="key" type="button" id="num1" data-value="1">1</button>
            <button class="key" type="button" id="num2" data-value="2">2</button>
            <button class="key" type="button" data-value="3">3</button>
            <button class="key key-operator" type="button" data-value="+">+</button>

            <button class="key key-zero" type="button" data-value="0">0</button>
            <button class="key" type="button" data-value=".">.</button>
            <button class="key key-equal" type="button" data-action="calculate">=</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
